---
layout: default
---

<header class="site-header post-page-header outer">
    <div class="hero-bg">
        {% include hero-bg.svg %}
    </div>
    <div class="inner">
        <nav class="site-nav">
            <div class="site-nav-left">
                <a href="{{ site.baseurl }}/" class="site-nav-logo">{{ site.title }}</a>
            </div>
            <div class="site-nav-right">
                <div class="social-links">
                    <a href="https://twitter.com/sabbour" title="Twitter" target="_blank" rel="noopener"><i class="fab fa-twitter fa-lg"></i></a>
                    <a href="https://linkedin.com/in/ahmedsabbour" title="LinkedIn" target="_blank" rel="noopener"><i class="fab fa-linkedin fa-lg"></i></a>
                    <a href="https://github.com/sabbour" title="GitHub" target="_blank" rel="noopener"><i class="fab fa-github fa-lg"></i></a>
                    <a href="https://stackoverflow.com/users/47582/sabbour" title="StackOverflow" target="_blank" rel="noopener"><i class="fab fa-stack-overflow fa-lg"></i></a>
                </div>
            </div>
        </nav>
    </div>
</header>

<main class="site-main outer">
    <div class="inner">
        <article class="post-full">
            <header class="post-full-header">
                <section class="post-full-meta">
                    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d %B %Y" | upcase }}</time>
                    {% if page.tags.size > 0 %}
                    <span class="date-divider">/</span>
                    {% for tag in page.tags %}<span class="post-full-meta-tag">{{ tag }}</span>{% unless forloop.last %}, {% endunless %}{% endfor %}
                    {% endif %}
                </section>
                <h1 class="post-full-title">{{ page.title }}</h1>
            </header>
            <section class="post-full-content">
                <div class="post-content">
                    {{ content }}
                </div>
            </section>
        </article>
    </div>
</main>
</main>
